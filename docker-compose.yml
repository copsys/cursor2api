services:
  cursor2api:
    build:
      context: .
      dockerfile: Dockerfile
    image: cursor2api:latest
    container_name: cursor2api
    restart: unless-stopped
    ports:
      - "3010:3010"
    volumes:
      # Optional: mount your config (copy config.yaml.example -> config.yaml first)
      # Most config changes are hot-reloaded from config.yaml; restart is only needed for non-hot-reloadable fields (e.g. port) or env-var changes. Without this mount, built-in defaults + env vars are used.
      - ./config.yaml:/app/config.yaml
      # Persist logs (enable logging.file_enabled in config.yaml or env)
      - ./logs:/app/logs
    environment:
      - NODE_ENV=production
      - PORT=3010
      - TIMEOUT=120
      # Proxy (optional). Most deployments do not need this; set if your host requires an outbound proxy.
      # - PROXY=http://host.docker.internal:7890

      # ---- Env overrides (optional) ----
      # - CURSOR_MODEL=anthropic/claude-sonnet-4.6

      # Auth (recommended for public deployments); comma-separated list
      # - AUTH_TOKEN=sk-your-secret-token-1,sk-your-secret-token-2

      # Thinking override (highest priority)
      # - THINKING_ENABLED=true

      # History compression
      # - COMPRESSION_ENABLED=true
      # - COMPRESSION_LEVEL=2

      # Continuations & history limits
      # - MAX_AUTO_CONTINUE=0
      # - MAX_HISTORY_MESSAGES=-1
      # - MAX_HISTORY_TOKENS=120000

      # Logging persistence (generally hot-reloadable; restart only needed for env-var changes)
      # File (JSONL, small volumes):
      # - LOG_FILE_ENABLED=true
      # - LOG_DIR=./logs
      # SQLite (recommended):
      # - LOG_DB_ENABLED=true
      # - LOG_DB_PATH=./logs/cursor2api.db

      # Fingerprint (base64 JSON)
      # - FP=eyJ1c2VyQWdlbnQiOiIuLi4ifQ==

      # Vision (default OCR). For external APIs set vision.mode: api in config.yaml plus base_url/api_key/model envs.

      # Tooling defaults (Claude Code / Cursor Agent recommended):
      #   tools.schema_mode: compact
      #   tools.description_max_length: 100
      #   tools.passthrough: false
      #   tools.disabled: false
      # Passthrough mode for non-Claude clients (Roo/Cline) if tool conflicts occur:
      # - TOOLS_PASSTHROUGH=true

      # Disable tools entirely (extreme context savings):
      # - TOOLS_DISABLED=true

      # Context pressure inflation
      # - CONTEXT_PRESSURE=1.35

      # Adaptive history budget
      # - TOOLS_ADAPTIVE_BUDGET=true

      # Smart truncation
      # - TOOLS_SMART_TRUNCATION=true

      # Response sanitization
      # - SANITIZE_RESPONSE=true
